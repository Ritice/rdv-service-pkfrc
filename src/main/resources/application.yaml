spring:
  application:
    name: rdv-service-pkfrc

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/rdv_pkfrc}
    username: ${SPRING_DATASOURCE_USERNAME:ritice}
    password: ${SPRING_DATASOURCE_PASSWORD:ritice}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

logging:
  level:
    com.pkfrc.rdv: DEBUG
    org.springframework.web: INFO