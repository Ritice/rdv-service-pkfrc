# application-test.yml
# Profil utilisé uniquement pour les tests d'intégration

spring:
  datasource:
    url: jdbc:h2:mem:rdv_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false  # Flyway désactivé en test, Hibernate gère le schéma

logging:
  level:
    com.rdv_service_pkfrc: DEBUG
    org.springframework.web: INFO